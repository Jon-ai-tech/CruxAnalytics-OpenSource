version: "3.9"

services:
  # ─── MySQL database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crux
      MYSQL_USER: crux
      MYSQL_PASSWORD: crux
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── App (used by Dev Container only) ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://crux:crux@db:3306/crux
      USE_MOCK_AUTH: "true"
      NODE_ENV: development

volumes:
  mysql_data:
